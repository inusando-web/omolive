<style>*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

background:linear-gradient(
135deg,
#ffffff,
#f7f2ff,
#fff5f5);

}

.header{

    position:fixed;

    top:20px;

    left:50%;

    transform:translateX(-50%);

    width:min(92%,1400px);

    z-index:9999;

    

}
.header{

    animation:headerIn .8s ease;

}

@keyframes headerIn{

0%{

    opacity:0;

    transform:translate(-50%,-40px);

}

100%{

    opacity:1;

    transform:translate(-50%,0);

}

}
.nav{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 35px;

    border-radius:60px;

    background:rgba(255,255,255,.78);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    box-shadow:
    0 12px 40px rgba(0,0,0,.12);

}

.menu{

    display:flex;

    gap:34px;

    list-style:none;

}

.menu a{

    text-decoration:none;

    color:#2382d8;

    font-weight:600;

    font-size:15px;

    letter-spacing:.08em;

    transition:.3s;

}

.menu a:hover{

    color:#63b6ff;

    transform:translateY(-2px);

}

.logo{

    text-decoration:none;

    color:#63b6ff;

    font-weight:bold;

    font-size:18px;

}



/* タイトル */

.hero{

text-align:center;

padding:60px;

}

.hero h1{

font-size:60px;

margin-bottom:30px;

}

.category button{

padding:12px 40px;

border:none;

border-radius:30px;

margin:10px;

cursor:pointer;

background:#eee;

transition:.3s;

}

.category button.active{

background:white;

box-shadow:0 10px 20px rgba(0,0,0,.15);

}

/* カード */

.card-area{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(230px,1fr));

gap:40px;

padding:60px;

}

.card{

text-align:center;

transition:.3s;

cursor:pointer;

}

.card img{

width:200px;

height:200px;

border-radius:50%;

object-fit:cover;

box-shadow:0 10px 30px rgba(0,0,0,.2);

transition:.3s;

}

.card:hover{

transform:translateY(-10px);

}

.card:hover img{

transform:scale(1.05);

}

.card h2{

margin-top:15px;

font-size:22px;

}
</style>
