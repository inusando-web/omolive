<style>
/* ===========================
   RESET
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:
        "Zen Maru Gothic",
        sans-serif;

    background:#fff;

    overflow-x:hidden;

    color:#333;

}

/* ===========================
   HERO
=========================== */

.hero{

    position:relative;

    width:100vw;

    height:100vh;

    overflow:hidden;

    isolation:isolate;

}

/* ===========================
   基準サイズ
=========================== */

.scene{

    position:absolute;

    width:1920px;
    height:1080px;

    left:0%;
    top:0%;

    transform:
        translate(-50%,-50%)
        scale(
            min(
                calc(100vw / 1920),
                calc(100vh / 1080)
            )
        );

    transform-origin:center;

}

/* ===========================
   オーロラ背景
=========================== */

.aurora{

    position:absolute;

    inset:-20%;

    background:

    radial-gradient(circle at 20% 20%,
    rgba(110,198,255,.55),
    transparent 45%),

    radial-gradient(circle at 80% 30%,
    rgba(255,196,236,.45),
    transparent 40%),

    radial-gradient(circle at 50% 80%,
    rgba(255,255,255,.9),
    transparent 50%),

    radial-gradient(circle at 70% 80%,
    rgba(180,235,255,.45),
    transparent 40%);

    filter:blur(80px);

    animation:

        auroraMove 18s ease-in-out infinite alternate;

}

/* ===========================
   ノイズ
=========================== */

.noise{

    position:absolute;

    inset:0;

    opacity:.04;

    pointer-events:none;

    background-image:

        radial-gradient(circle,#000 1px,transparent 1px);

    background-size:5px 5px;

    mix-blend-mode:soft-light;

}

/* ===========================
   光ライン
=========================== */

.light-line{

    position:absolute;

    top:-25%;

    left:-40%;

    width:35%;

    height:180%;

    background:

        linear-gradient(

            90deg,

            transparent,

            rgba(255,255,255,.65),

            transparent

        );

    transform:

        rotate(18deg);

    filter:blur(20px);

    animation:

        shine 8s linear infinite;

}

/* ===========================
   ガラス用ぼかし
=========================== */

.glass{

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

}

/* ===========================
   ボケライト
=========================== */

.hero::before{

    content:"";

    position:absolute;

    inset:0;

    background:

    radial-gradient(circle at 10% 30%,
    rgba(255,255,255,.65),
    transparent 8%),

    radial-gradient(circle at 85% 70%,
    rgba(255,255,255,.55),
    transparent 10%),

    radial-gradient(circle at 60% 20%,
    rgba(255,255,255,.5),
    transparent 6%);

    filter:blur(20px);

    animation:

        glowMove 10s ease-in-out infinite alternate;

}

/* ===========================
   セクション
=========================== */

section:not(.hero){

    min-height:100vh;

    display:flex;

    align-items:center;

    justify-content:center;

    background:#fff;

}

.container{

    width:min(1200px,90vw);

    margin:auto;

}

/* ===========================
   Footer
=========================== */

footer{

    padding:60px;

    text-align:center;

    background:#f6f8fb;

    color:#777;

    letter-spacing:3px;

}

/* ===========================
   アニメーション
=========================== */

@keyframes auroraMove{

    0%{

        transform:
        scale(1)
        rotate(0deg);

    }

    50%{

        transform:
        scale(1.08)
        rotate(4deg);

    }

    100%{

        transform:
        scale(1.12)
        rotate(-4deg);

    }

}

@keyframes shine{

    0%{

        left:-45%;

    }

    100%{

        left:140%;

    }

}

@keyframes glowMove{

    from{

        opacity:.5;

        transform:scale(1);

    }

    to{

        opacity:.9;

        transform:scale(1.08);

    }

}

/* ======================================
   キャラクター
====================================== */

.character{

    position:absolute;

    user-select:none;
    pointer-events:none;

    transform-origin:center;

    transition:
        transform .35s ease,
        filter .35s ease;

    filter:
        drop-shadow(0 25px 40px rgba(0,0,0,.18))
        drop-shadow(0 0 30px rgba(255,255,255,.45));

    animation:
        float 6s ease-in-out infinite;

}

/* 左上 */

.c1{

    width:900px;
    left:100px;
    top:10px;
    animation-delay:0s;

}

/* 右上 */

.c2{

    width:900px;
    left:980px;
    top:10px;
    animation-delay:1.2s;

}

/* 左下 */

.c3{

    width:800px;
    left:200px;
    top:520px;
    animation-delay:2.4s;

}

/* 右下 */

.c4{

    width:200px;
    left:1200px;
    top:600px;
    animation-delay:3.5s;

}

/* さこんじ */
.c5{

    width:200px;
    left:700px;
    top:20px;
    animation-delay:0.8s;

}

/* 本也 */
.c6{

    width:200px;
    left:930px;
    top:700px;
    animation-delay:1.5s;

}

.c7{

    width:200px;
    left:80px;
    top:400px;
    animation-delay:2.3s;

}

.c8{

    width:200px;
    left:150px;
    top:750px;
    animation-delay:1.8s;

}

.c9{

    width:200px;
    left:1600px;
    top:40px;
    animation-delay:3.2s;

}

.c10{

    width:200px;
    left:50px;
    top:20px;
    animation-delay:1.5s;

}

/* ゆるうんち */
.c11{

    width:300px;
    left:1700px;
    top:200px;
    animation-delay:1.5s;

}

/* らぺ */
.c12{

    width:300px;
    left:1500px;
    top:700px;
    animation-delay:1.5s;

}



@keyframes float{

    0%{

        transform:
            translateY(0px)
            rotate(0deg);

    }

    50%{

        transform:
            translateY(-18px)
            rotate(1deg);

    }

    100%{

        transform:
            translateY(0px)
            rotate(0deg);

    }

}

/* ======================================
   ガラスカード
====================================== */

.glass{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:540px;

    padding:45px 55px;

    border-radius:34px;

    background:

        rgba(255,255,255,.18);

    border:

        1px solid rgba(255,255,255,.45);

    box-shadow:

        0 20px 60px rgba(0,0,0,.10),
        inset 0 1px 0 rgba(255,255,255,.75);

    text-align:center;

    z-index:50;

}

/* ガラス反射 */

.glass::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    background:

        linear-gradient(

            120deg,

            rgba(255,255,255,.65),

            transparent 30%,

            transparent 70%,

            rgba(255,255,255,.18)

        );

    opacity:.65;

    pointer-events:none;

}

/* ======================================
   タイトル
====================================== */

.glass h1{

    font-size:76px;

    letter-spacing:8px;

    color:#4db4ff;

    font-weight:700;

    text-shadow:

        0 0 20px rgba(255,255,255,.8),
        0 0 40px rgba(120,210,255,.4);

}

.glass p{

    margin-top:20px;

    font-size:19px;

    letter-spacing:2px;

    color:#555;

    line-height:1.8;

}

/* ======================================
   ENTERボタン
====================================== */

.enter{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    margin-top:35px;

    width:220px;

    height:58px;

    border-radius:999px;

    text-decoration:none;

    color:white;

    font-weight:700;

    letter-spacing:3px;

    background:

        linear-gradient(

            135deg,

            #6fd0ff,

            #6ca8ff,

            #88e4ff

        );

    box-shadow:

        0 12px 28px rgba(0,150,255,.28);

    transition:.35s;

    position:relative;

    overflow:hidden;

}

/* ボタンの光 */

.enter::before{

    content:"";

    position:absolute;

    top:0;

    left:-100%;

    width:60%;

    height:100%;

    background:

        linear-gradient(

            90deg,

            transparent,

            rgba(255,255,255,.8),

            transparent

        );

    transform:skewX(-25deg);

}

.enter:hover{

    transform:

        translateY(-4px)
        scale(1.05);

    box-shadow:

        0 20px 40px rgba(0,170,255,.35);

}

.enter:hover::before{

    animation:

        buttonShine .8s linear;

}

@keyframes buttonShine{

    to{

        left:160%;

    }

}

/* ======================================
   タイトル登場
====================================== */

.glass{

    animation:

        heroFade 1.3s ease;

}

@keyframes heroFade{

    from{

        opacity:0;

        transform:

            translate(-50%,-40%)
            scale(.92);

    }

    to{

        opacity:1;

        transform:

            translate(-50%,-50%)
            scale(1);

    }

}

/* ======================================
   タイトル文字
====================================== */

.glass h1{

    animation:

        titleGlow 4s ease-in-out infinite;

}

@keyframes titleGlow{

    0%{

        text-shadow:

            0 0 20px white;

    }

    50%{

        text-shadow:

            0 0 40px #bfe8ff,
            0 0 70px #90d9ff;

    }

    100%{

        text-shadow:

            0 0 20px white;

    }

}

/* ===========================================
   Sparkles
=========================================== */

#sparkles,
#shootingStars,
#bubbles,
#petals{

    position:absolute;

    inset:0;

    pointer-events:none;

    overflow:hidden;

}

/* ===========================================
   キラキラ
=========================================== */

.sparkle{

    position:absolute;

    width:6px;
    height:6px;

    border-radius:50%;

    background:white;

    box-shadow:

        0 0 8px white,
        0 0 18px #9ddcff,
        0 0 28px #8fd6ff;

    animation:

        twinkle linear infinite;

}

.sparkle.small{

    width:3px;
    height:3px;

}

.sparkle.big{

    width:10px;
    height:10px;

}

@keyframes twinkle{

    0%{

        opacity:0;
        transform:scale(.2);

    }

    50%{

        opacity:1;
        transform:scale(1.8);

    }

    100%{

        opacity:0;
        transform:scale(.2);

    }

}

/* ===========================================
   流れ星
=========================================== */

.star{

    position:absolute;

    width:180px;

    height:2px;

    background:

        linear-gradient(
            90deg,
            rgba(255,255,255,0),
            white
        );

    filter:

        blur(.5px);

    transform:

        rotate(-35deg);

    animation:

        shooting 3s linear infinite;

}

.star::after{

    content:"";

    position:absolute;

    right:0;

    top:-2px;

    width:8px;
    height:8px;

    border-radius:50%;

    background:white;

    box-shadow:

        0 0 20px white;

}

@keyframes shooting{

    from{

        transform:

            translate(-300px,-200px)

            rotate(-35deg);

        opacity:0;

    }

    20%{

        opacity:1;

    }

    to{

        transform:

            translate(2200px,1300px)

            rotate(-35deg);

        opacity:0;

    }

}

/* ===========================================
   シャボン玉
=========================================== */

.bubble{

    position:absolute;

    border-radius:50%;

    border:

        1px solid rgba(255,255,255,.6);

    backdrop-filter:

        blur(3px);

    background:

        radial-gradient(

            circle at 30% 30%,

            rgba(255,255,255,.7),

            rgba(255,255,255,.05)

        );

    box-shadow:

        inset 0 0 12px rgba(255,255,255,.35);

    animation:

        bubbleFloat linear infinite;

}

@keyframes bubbleFloat{

    from{

        transform:

            translateY(0);

        opacity:0;

    }

    10%{

        opacity:.8;

    }

    90%{

        opacity:.8;

    }

    to{

        transform:

            translateY(-120vh);

        opacity:0;

    }

}

/* ===========================================
   花びら
=========================================== */

.petal{

    position:absolute;

    width:18px;

    height:14px;

    background:

        linear-gradient(

            135deg,

            #ffd8ef,

            #fff

        );

    border-radius:

        60% 60% 60% 0;

    opacity:.7;

    filter:

        blur(.2px);

    animation:

        petalFall linear infinite;

}

@keyframes petalFall{

    from{

        transform:

            translateY(-50px)

            rotate(0deg);

    }

    to{

        transform:

            translateY(120vh)

            rotate(520deg)

            translateX(100px);

    }

}

/* ===========================================
   六角形
=========================================== */

.hex{

    position:absolute;

    width:12px;

    height:12px;

    background:

        rgba(180,235,255,.35);

    clip-path:

        polygon(
            25% 0%,
            75% 0%,
            100% 50%,
            75% 100%,
            25% 100%,
            0% 50%
        );

    animation:

        hexFloat 14s linear infinite;

}

@keyframes hexFloat{

    from{

        transform:

            translateY(110vh)

            rotate(0deg);

    }

    to{

        transform:

            translateY(-120vh)

            rotate(360deg);

    }

}

/* ===========================================
   キャラGlow
=========================================== */

.character::after{

    content:"";

    position:absolute;

    inset:-40px;

    border-radius:50%;

    background:

        radial-gradient(

            circle,

            rgba(170,230,255,.18),

            transparent 70%

        );

    z-index:-1;

}

/* ===========================================
   Hover
=========================================== */

.character:hover{

    filter:

        drop-shadow(0 30px 50px rgba(0,0,0,.2))

        drop-shadow(0 0 50px rgba(140,220,255,.65));

}

/* ===========================================
   Hero Fade
=========================================== */

.hero{

    animation:

        heroAppear 1.5s ease;

}

@keyframes heroAppear{

    from{

        opacity:0;

        filter:blur(10px);

    }

    to{

        opacity:1;

        filter:blur(0);

    }

}

.header{

    position:fixed;

    top:20px;

    left:50%;

    transform:translateX(-50%);

    width:min(92%,1400px);

    z-index:9999;

    

}

.header{

    animation:headerIn .8s ease;

}

@keyframes headerIn{

0%{

    opacity:0;

    transform:translate(-50%,-40px);

}

100%{

    opacity:1;

    transform:translate(-50%,0);

}

}
.nav{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 35px;

    border-radius:60px;

    background:rgba(255,255,255,.78);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    box-shadow:
    0 12px 40px rgba(0,0,0,.12);

}

.menu{

    display:flex;

    gap:34px;

    list-style:none;

}

.menu a{

    text-decoration:none;

    color:#2382d8;

    font-weight:600;

    font-size:15px;

    letter-spacing:.08em;

    transition:.3s;

}

.menu a:hover{

    color:#63b6ff;

    transform:translateY(-2px);

}

.logo{

    text-decoration:none;

    color:#63b6ff;

    font-weight:bold;

    font-size:18px;

}



</style>

<script>
    // ==========================================
// HERO
// ==========================================

const hero = document.querySelector(".hero");

const sparkleLayer = document.getElementById("sparkles");
const starLayer = document.getElementById("shootingStars");
const bubbleLayer = document.getElementById("bubbles");
const petalLayer = document.getElementById("petals");


// ==========================================
// Sparkles
// ==========================================

for(let i=0;i<140;i++){

    const s=document.createElement("div");

    s.className="sparkle";

    if(Math.random()>.65){

        s.classList.add("big");

    }else if(Math.random()>.5){

        s.classList.add("small");

    }

    s.style.left=Math.random()*100+"%";

    s.style.top=Math.random()*100+"%";

    s.style.animationDuration=
        2+Math.random()*4+"s";

    s.style.animationDelay=
        Math.random()*5+"s";

    sparkleLayer.appendChild(s);

}



// ==========================================
// Shooting Star
// ==========================================

function createStar(){

    const star=document.createElement("div");

    star.className="star";

    star.style.top=
        Math.random()*40+"%";

    star.style.left="-15%";

    star.style.animationDuration=
        2+Math.random()*2+"s";

    starLayer.appendChild(star);

    setTimeout(()=>{

        star.remove();

    },4000);

}

setInterval(createStar,3000);




// ==========================================
// Bubble
// ==========================================

function createBubble(){

    const bubble=document.createElement("div");

    bubble.className="bubble";

    const size=20+Math.random()*50;

    bubble.style.width=size+"px";

    bubble.style.height=size+"px";

    bubble.style.left=Math.random()*100+"%";

    bubble.style.bottom="-100px";

    bubble.style.animationDuration=
        8+Math.random()*10+"s";

    bubbleLayer.appendChild(bubble);

    setTimeout(()=>{

        bubble.remove();

    },18000);

}

setInterval(createBubble,900);



// ==========================================
// Petal
// ==========================================

function createPetal(){

    const p=document.createElement("div");

    p.className="petal";

    p.style.left=Math.random()*100+"%";

    p.style.animationDuration=
        8+Math.random()*5+"s";

    petalLayer.appendChild(p);

    setTimeout(()=>{

        p.remove();

    },13000);

}

setInterval(createPetal,1400);
